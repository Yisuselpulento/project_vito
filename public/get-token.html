<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obtener Token</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #1a1a2e; color: white; }
    .token-box { background: #16213e; padding: 15px; border-radius: 8px; margin: 20px 0; word-break: break-all; }
    button { background: #0f3460; color: white; padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin: 5px; }
    .copy { background: #e94560; }
    .open { background: #0f3460; }
    a { color: #4da8da; }
  </style>
</head>
<body>
  <h1>🔑 Tu Token de Buses JM</h1>
  <div id="token" class="token-box">Cargando...</div>
  <button class="copy" onclick="copyToken()">📋 Copiar Token</button>
  <button class="open" onclick="openWithToken()">🚀 Abrir App con Token</button>
  
  <h3 style="margin-top:30px">Instrucciones:</h3>
  <ol style="color:#aaa">
    <li>Copia el token arriba</li>
    <li>Pégalor en la URL de tu app: <a href="#" id="appUrl">tuapp.com/?token=TOKEN</a></li>
  </ol>

  <script>
    function getToken() {
      const keys = Object.keys(localStorage);
      for (let key of keys) {
        if (key.includes('token')) {
          const value = localStorage.getItem(key);
          if (value && value.startsWith('eyJ')) return value;
        }
      }
      return null;
    }

    const token = getToken();
    const tokenEl = document.getElementById('token');
    const appUrlEl = document.getElementById('appUrl');
    
    if (token) {
      tokenEl.textContent = token;
      appUrlEl.textContent = 'tuapp.com/?token=' + token;
      appUrlEl.href = 'tuapp.com/?token=' + token;
    } else {
      tokenEl.textContent = '❌ No se encontró token';
      tokenEl.style.color = '#e94560';
    }

    function copyToken() {
      if (token) {
        navigator.clipboard.writeText(token);
        alert('✅ Token copiado al portapapeles!');
      }
    }

    function openWithToken() {
      if (token) {
        const appUrl = 'http://localhost:5173/?token=' + token;
        window.open(appUrl, '_blank');
      }
    }
  </script>
</body>
</html>
